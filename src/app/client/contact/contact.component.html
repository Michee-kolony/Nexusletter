<section class="relative min-h-screen flex items-center justify-center bg-gradient-to-br from-[#E5891E] to-[#ffb347] py-32 px-6 overflow-hidden">
  
  <!-- Textures décoratives statiques -->
  
  <!-- 1. Pattern de points (polka dots) -->
  <div class="absolute inset-0 opacity-20 pointer-events-none"
       style="background-image: radial-gradient(circle, white 1.5px, transparent 1.5px);
              background-size: 30px 30px;">
  </div>
  
  <!-- 2. Lignes diagonales fines -->
  <div class="absolute inset-0 opacity-10 pointer-events-none"
       style="background-image: repeating-linear-gradient(45deg, white 0px, white 1px, transparent 1px, transparent 15px);">
  </div>
  
  <!-- 3. Cercles concentriques décoratifs (arrière-plan) -->
  <div class="absolute top-10 left-10 w-64 h-64 rounded-full border border-white/20 pointer-events-none"></div>
  <div class="absolute top-20 left-20 w-80 h-80 rounded-full border border-white/10 pointer-events-none"></div>
  <div class="absolute bottom-10 right-10 w-72 h-72 rounded-full border border-white/20 pointer-events-none"></div>
  <div class="absolute bottom-20 right-20 w-96 h-96 rounded-full border border-white/10 pointer-events-none"></div>
  
  <!-- 4. Petits carrés disséminés -->
  <div class="absolute top-[15%] right-[10%] w-8 h-8 border border-white/30 rotate-12 pointer-events-none"></div>
  <div class="absolute bottom-[20%] left-[5%] w-6 h-6 border border-white/25 rotate-45 pointer-events-none"></div>
  <div class="absolute top-[40%] left-[85%] w-10 h-10 border border-white/20 rotate-12 pointer-events-none"></div>
  <div class="absolute bottom-[60%] right-[8%] w-4 h-4 border border-white/30 pointer-events-none"></div>
  
  <!-- 5. Texture de vague subtile (bas de page) -->
  <div class="absolute bottom-0 left-0 w-full opacity-10 pointer-events-none"
       style="background: repeating-linear-gradient(0deg, white 0px, white 2px, transparent 2px, transparent 25px);
              height: 120px;">
  </div>
  
  <!-- 6. Dégradé de taches douces (overlay) -->
  <div class="absolute inset-0 opacity-20 pointer-events-none"
       style="background: radial-gradient(ellipse at 20% 30%, white 0%, transparent 50%),
                    radial-gradient(ellipse at 80% 70%, white 0%, transparent 50%);">
  </div>

  <!-- Contenu principal -->
  <div class="relative z-10 max-w-5xl w-full backdrop-blur-md rounded-2xl p-8 md:p-12">

    <!-- TITLE -->
    <h2 class="text-3xl md:text-4xl font-bold text-white text-center mb-10">
      Contactez-nous
    </h2>

    <form class="space-y-6">

      <!-- ROW 1 -->
      <div class="grid md:grid-cols-2 gap-6">

        <div>
          <label class="text-white text-sm mb-2 block">Nom complet</label>
          <input
            type="text"
            placeholder="Votre nom"
            class="w-full px-4 py-3 rounded-lg bg-[#BB7522] text-white outline-none focus:ring-2 focus:ring-[#E5891E]"
          />
        </div>

        <div>
          <label class="text-white text-sm mb-2 block">Email</label>
          <input
            type="email"
            placeholder="Votre email"
            class="w-full px-4 py-3 rounded-lg bg-[#BB7522] text-white outline-none focus:ring-2 focus:ring-[#E5891E]"
          />
        </div>

      </div>

      <!-- ROW 2 -->
      <div class="grid md:grid-cols-2 gap-6">

        <div>
          <label class="text-white text-sm mb-2 block">Téléphone</label>
          <input
            type="text"
            placeholder="+243 ..."
            class="w-full px-4 py-3 rounded-lg bg-[#BB7522] text-white outline-none focus:ring-2 focus:ring-[#E5891E]"
          />
        </div>

        <div>
          <label class="text-white text-sm mb-2 block">Sujet</label>
          <input
            type="text"
            placeholder="Sujet de votre message"
            class="w-full px-4 py-3 rounded-lg bg-[#BB7522] text-white outline-none focus:ring-2 focus:ring-[#E5891E]"
          />
        </div>

      </div>

      <!-- MESSAGE -->
      <div>
        <label class="text-white text-sm mb-2 block">Message</label>
        <textarea
          rows="5"
          placeholder="Écrivez votre message..."
          class="w-full px-4 py-3 rounded-lg bg-[#BB7522] text-white outline-none focus:ring-2 focus:ring-[#E5891E]"
        ></textarea>
      </div>

      <!-- BUTTON -->
      <div class="pt-4">
        <button
          type="submit"
          class="bg-[#231F20] text-white px-8 py-3 rounded-full font-semibold hover:bg-black transition hover:scale-105"
        >
          Envoyer le message
        </button>
      </div>

    </form>

  </div>

</section>
