<app-navbar></app-navbar>
<router-outlet></router-outlet>
<app-footer></app-footer>

<!-- BACK TO TOP BUTTON -->
<button
  *ngIf="showScrollTop"
  (click)="scrollToTop()"
  class="fixed bottom-6 right-6 w-12 h-12 bg-[#E5891E] text-white rounded-full flex items-center justify-center shadow-lg hover:scale-110 transition duration-300 z-50"
>
  <i class="fa-solid fa-chevron-up"></i>
</button>


<div class="splashscreen" *ngIf="showSplash">
  <!-- Image de fond sombre -->
  <div class="splash-background">
    <div class="bg-overlay"></div>
    <img src="images/484444978_676936471665108_3206104499052780147_n.webp" alt="Background" class="bg-image"/>
  </div>

  <!-- Effet galaxy avec points orange -->
  <div class="galaxy-bg">
    <div class="star-orange" *ngFor="let star of stars"></div>
  </div>

  <div class="splash-content">
    <!-- Logo animé -->
    <div class="logo-container">
      <div class="logo-ring"></div>
      <div class="logo-ring ring-2"></div>
      <div class="logo-ring ring-3"></div>
      <div class="nexus-logo">
        <img src="images/logo-Photoroom.png" alt="Nexus Logo"/>
      </div>
    </div>

    <!-- Texte animé -->
    <div class="text-container">
      <div class="typewriter-text">{{ displayedText }}</div>
      <div class="cursor" [class.blinking]="isTyping"></div>
    </div>

    <!-- Barre de progression -->
    <div class="progress-bar" *ngIf="!isTyping && showProgress">
      <div class="progress-fill" [style.width.%]="progressWidth"></div>
    </div>
  </div>
</div>
